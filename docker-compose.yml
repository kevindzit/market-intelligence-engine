version: '3.8'

services:
  trading-bot:
    build: .
    container_name: trading-bot
    runtime: nvidia  # Requires nvidia-docker
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - POSTGRES_HOST=host.docker.internal  # Access host PostgreSQL
      - POSTGRES_PORT=54594
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./chroma_db_news:/app/chroma_db_news  # Persist ChromaDB
      - ./logs:/app/logs                      # Persist logs
      - ./outputs:/app/outputs                # Persist outputs
      - ollama-models:/root/.ollama           # Persist Ollama models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama-models:  # Named volume for Ollama models (survives container restarts)
