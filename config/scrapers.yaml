# Trading Bot Scraper Configuration
# To add a new scraper: Just add a new entry below!

scrapers:
  # ==================== NEWS SCRAPERS ====================
  - name: NewsAPI Reader
    script: news_scrapers/newsapi_reader.py
    category: news
    description: Fetches US business headlines from NewsAPI
    enabled: true
    free_tier: "100 calls/day"
    interval: "15 minutes"

  - name: RSS Aggregator
    script: news_scrapers/rss_aggregator.py
    category: news
    description: Aggregates news from 9 RSS feeds (MarketWatch, CNBC, etc.)
    enabled: true
    free_tier: "Unlimited"
    interval: "15 minutes"

  # ==================== CONGRESSIONAL TRADES ====================
  - name: Senate Scraper
    script: fundamentals_data/senate_scraper.py
    category: congressional
    description: Scrapes Senate trade disclosures
    enabled: true  # TESTING: Enabled for full system test
    mode: oneshot
    free_tier: "Unlimited"
    interval: "6 hours"

  - name: House Scraper
    script: fundamentals_data/house_scraper.py
    category: congressional
    description: Scrapes House trade disclosures
    enabled: true  # TESTING: Enabled for full system test
    mode: oneshot
    free_tier: "Unlimited"
    interval: "6 hours"

  # ==================== ECONOMIC DATA ====================
  - name: FRED Economic Data
    script: fundamentals_data/fred_data_reader.py
    category: economic
    description: Fetches macroeconomic indicators from FRED
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "6 hours"

  # ==================== SEC FILINGS ====================
  - name: SEC EDGAR Reader
    script: fundamentals_data/edgar_rss_reader.py
    category: sec
    description: Monitors SEC EDGAR RSS for new filings
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "5 minutes"

  # ==================== COMPANY FUNDAMENTALS ====================
  - name: FMP Fundamentals
    script: fundamentals_data/fmp_fundamentals_reader.py
    category: fundamentals
    description: Fetches company profiles from Financial Modeling Prep
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "250 calls/day"
    interval: "6 hours"

  - name: yfinance Fundamentals
    script: fundamentals_data/yfinance_fundamentals_reader.py
    category: fundamentals
    description: Fetches company data from Yahoo Finance
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "6 hours"

  # ==================== CRYPTO SCRAPERS ====================
  - name: Twitter Meme Coins
    script: crypto_scrapers/twitter_memecoins.py
    category: crypto
    description: Meme coin sentiment (PEPE, DOGE, SHIB, BONK, WIF)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Large Caps
    script: crypto_scrapers/twitter_largecaps.py
    category: crypto
    description: Top 7 by market cap (BTC, ETH, SOL, BNB, XRP, ADA, TRX)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter DeFi
    script: crypto_scrapers/twitter_defi.py
    category: crypto
    description: DeFi protocols (UNI, AAVE, LDO, MKR, CRV, GMX, SNX)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Layer 1s
    script: crypto_scrapers/twitter_layer1s.py
    category: crypto
    description: Alt L1 blockchains (AVAX, DOT, NEAR, ATOM, ICP, ALGO, FTM)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Layer 2s
    script: crypto_scrapers/twitter_layer2s.py
    category: crypto
    description: Ethereum L2s (ARB, OP, MATIC, METIS, IMX)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter AI/ML
    script: crypto_scrapers/twitter_ai.py
    category: crypto
    description: AI/ML tokens (RENDER, FET, GRT, OCEAN, AGIX, TAO)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Whale Tracker
    script: crypto_scrapers/twitter_whales.py
    category: crypto
    description: Monitors 38 high-signal whale accounts (alpha callers, on-chain analysts, insiders)
    enabled: true
    use_proxy: true   # Use Tor/VPN for IP rotation
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "10 minutes"

  - name: Binance OHLCV
    script: crypto_scrapers/binance_ohlcv.py
    category: crypto
    description: 5-minute price candles for all 42 tokens (OHLCV data)
    enabled: true
    use_proxy: true  # Route through Tor/VPN (Binance blocked in US)
    free_tier: "Free (public API)"
    interval: "5 minutes"

  - name: Binance Order Book
    script: crypto_scrapers/binance_orderbook.py
    category: crypto
    description: Real-time order book depth for optimal entry/exit timing
    enabled: true  # Table created and tested successfully
    use_proxy: true  # Route through Tor/VPN (Binance blocked in US)
    free_tier: "Free (public API)"
    interval: "30 seconds"

  - name: Binance Funding Rates
    script: crypto_scrapers/binance_funding.py
    category: crypto
    description: Perpetual futures funding rates for leverage/reversal detection
    enabled: true  # Table created and tested successfully
    use_proxy: true  # Route through Tor/VPN (Binance blocked in US)
    free_tier: "Free (public API)"
    interval: "1 hour"

  - name: Fear & Greed Index
    script: crypto_scrapers/fear_greed_scraper.py
    category: crypto
    description: Market psychology indicator (0-100 sentiment score)
    enabled: true  # Table created and tested successfully
    free_tier: "Free (Alternative.me API)"
    interval: "1 hour"

  - name: Stablecoin Flow Monitor
    script: crypto_scrapers/stablecoin_flow_scraper.py
    category: crypto
    description: Tracks USDT/USDC/DAI velocity & supply (0.87 BTC correlation, leads rallies)
    enabled: true
    free_tier: "Free (CoinGecko: 10k calls/month)"
    interval: "30 minutes"

  - name: Binance Liquidations
    script: crypto_scrapers/binance_liquidations.py
    category: crypto
    description: Real-time liquidations for flash crash/reversal detection
    enabled: true  # Table created and tested successfully
    use_proxy: true  # Route through Tor/VPN (Binance blocked in US)
    free_tier: "Free (public API)"
    interval: "30 seconds"

  - name: Exchange Flows
    script: crypto_scrapers/exchange_flows.py
    category: crypto
    description: Whale movements to/from exchanges (BTC focus)
    enabled: true  # Etherscan API key confirmed in .env
    free_tier: "Free (Etherscan: 100k calls/day)"
    interval: "15 minutes"

  - name: Binance Open Interest
    script: crypto_scrapers/binance_oi.py
    category: crypto
    description: Tracks total futures leverage (OI) for volatility prediction
    enabled: true  # Ready to test
    use_proxy: true  # Route through Tor/VPN (Binance blocked in US)
    free_tier: "Free (public API)"
    interval: "5 minutes"

  - name: DEX Liquidity Monitor
    script: crypto_scrapers/dex_liquidity_monitor.py
    category: crypto
    description: Tracks DEX liquidity & volume (40% market share, leads CEX)
    enabled: true
    free_tier: "Free (DexScreener + CoinGecko APIs)"
    interval: "30 minutes"

  - name: DeFi TVL Monitor
    script: crypto_scrapers/defi_tvl_monitor.py
    category: crypto
    description: Tracks protocol TVL and capital flows across chains (DeFiLlama)
    enabled: true
    free_tier: "Free (DeFiLlama API, no key required)"
    interval: "30 minutes"

  - name: Options Volatility Monitor
    script: crypto_scrapers/options_volatility_monitor.py
    category: crypto
    description: Tracks BTC/ETH implied volatility and skew for crash prediction (Deribit)
    enabled: true
    free_tier: "Free (Deribit public API, no key required)"
    interval: "30 minutes"

  - name: Bridge Flows Monitor
    script: crypto_scrapers/bridge_flows_monitor.py
    category: crypto
    description: Tracks L1/L2 capital rotation via bridge flows (DeFiLlama Bridges)
    enabled: true
    mode: oneshot  # runs once per interval; script exits after a single cycle
    free_tier: "Free (DeFiLlama Bridges API, no key required, 500 req/min)"
    interval: "30 minutes"

