# Trading Bot Scraper Configuration
# To add a new scraper: Just add a new entry below!

scrapers:
  # ==================== NEWS SCRAPERS ====================
  - name: NewsAPI Reader
    script: news_scrapers/newsapi_reader.py
    category: news
    description: Fetches US business headlines from NewsAPI
    enabled: true
    free_tier: "100 calls/day"
    interval: "15 minutes"

  - name: RSS Aggregator
    script: news_scrapers/rss_aggregator.py
    category: news
    description: Aggregates news from 9 RSS feeds (MarketWatch, CNBC, etc.)
    enabled: true
    free_tier: "Unlimited"
    interval: "15 minutes"

  # ==================== CONGRESSIONAL TRADES ====================
  - name: Senate Scraper
    script: senate_scraper/senate_scraper.py
    category: congressional
    description: Scrapes Senate trade disclosures
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "daily"

  - name: House Scraper
    script: house_scraper/house_scraper.py
    category: congressional
    description: Scrapes House trade disclosures
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "daily"

  # ==================== ECONOMIC DATA ====================
  - name: FRED Economic Data
    script: data_api/fred_data_reader.py
    category: economic
    description: Fetches macroeconomic indicators from FRED
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "daily"

  # ==================== SEC FILINGS ====================
  - name: SEC EDGAR Reader
    script: sec_data/edgar_rss_reader.py
    category: sec
    description: Monitors SEC EDGAR RSS for new filings
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "10 minutes"

  # ==================== COMPANY FUNDAMENTALS ====================
  - name: FMP Fundamentals
    script: fundamentals_data/fmp_fundamentals_reader.py
    category: fundamentals
    description: Fetches company profiles from Financial Modeling Prep
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "250 calls/day"
    interval: "daily"

  - name: yfinance Fundamentals
    script: fundamentals_data/yfinance_fundamentals_reader.py
    category: fundamentals
    description: Fetches company data from Yahoo Finance
    enabled: true  # TESTING: Enabled for full system test
    free_tier: "Unlimited"
    interval: "daily"

  # ==================== CRYPTO SCRAPERS ====================
  - name: Twitter Meme Coins
    script: crypto_scrapers/twitter_memecoins.py
    category: crypto
    description: Meme coin sentiment (PEPE, DOGE, SHIB, BONK, WIF)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Large Caps
    script: crypto_scrapers/twitter_largecaps.py
    category: crypto
    description: Top 7 by market cap (BTC, ETH, SOL, BNB, XRP, ADA, TRX)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter DeFi
    script: crypto_scrapers/twitter_defi.py
    category: crypto
    description: DeFi protocols (UNI, AAVE, LDO, MKR, CRV, GMX, SNX)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Layer 1s
    script: crypto_scrapers/twitter_layer1s.py
    category: crypto
    description: Alt L1 blockchains (AVAX, DOT, NEAR, ATOM, ICP, ALGO, FTM)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Layer 2s
    script: crypto_scrapers/twitter_layer2s.py
    category: crypto
    description: Ethereum L2s (ARB, OP, MATIC, METIS, IMX)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter AI/ML
    script: crypto_scrapers/twitter_ai.py
    category: crypto
    description: AI/ML tokens (RENDER, FET, GRT, OCEAN, AGIX, TAO)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "5 minutes"

  - name: Twitter Whale Tracker
    script: crypto_scrapers/twitter_whales.py
    category: crypto
    description: Monitors 38 high-signal whale accounts (alpha callers, on-chain analysts, insiders)
    enabled: true
    free_tier: "Free (4-account pool, 200 searches/15min)"
    interval: "10 minutes"

